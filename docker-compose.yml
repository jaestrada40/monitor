services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: monitorpro
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: monitorpro
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitorpro"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://monitorpro:${DB_PASSWORD}@db:5432/monitorpro
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_NAME: monitorpro_session
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    entrypoint: ["sh", "-c", "node dist/migrate.js && node dist/index.js"]

  frontend:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  db_data:
